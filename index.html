<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>דשבורד אופציות – Yahoo Finance</title>
<style>
body { font-family: Arial; background:#050816; color:#f5f5f5; padding:20px; }
h1,h2 { text-align:center; }
.controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
input,select,button { padding:6px 10px; border-radius:4px; border:1px solid #444; background:#151a2c; color:#fff; }
button { cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th,td { border-bottom:1px solid #333; padding:8px; text-align:center; }
.badge-call { background:#1e88e5; padding:2px 6px; border-radius:4px; }
.score-positive { color:#4caf50; font-weight:bold; }
.score-negative { color:#f44336; font-weight:bold; }
.be-good { color:#4caf50; font-weight:bold; }
.be-bad { color:#f44336; font-weight:bold; }
</style>
</head>

<body>
<h1>דשבורד אופציות CALL – HV/IV</h1>
<h2>נתונים מ‑Yahoo Finance (חינם)</h2>

<div class="controls">
  <div>
    <label>מדד:</label>
    <select id="universeSelect">
      <option value="sp500">S&P 500</option>
      <option value="nasdaq100">Nasdaq 100</option>
    </select>
  </div>

  <div>
    <label>מינימום HV:</label>
    <input type="number" id="minHv" value="0.10" step="0.05" />
  </div>

  <div>
    <label>טווח פקיעה (חודשים):</label>
    <input type="number" id="minMonths" value="1" step="1" style="width:60px;" /> -
    <input type="number" id="maxMonths" value="12" step="1" style="width:60px;" />
  </div>

  <button id="refreshBtn">רענן</button>
</div>

<table>
<thead>
<tr>
<th>טיקר</th>
<th>CALL</th>
<th>מחיר מניה</th>
<th>סטרייק</th>
<th>ATM Δ</th>
<th>מחיר אופציה</th>
<th>פקיעה</th>
<th>ימים</th>
<th>HV</th>
<th>IV</th>
<th>% to break even</th>
<th>Score</th>
</tr>
</thead>
<tbody id="optionsBody"></tbody>
</table>

<script>
// ===== רשימות מדדים =====
const SP500 = [
"AAPL","MSFT","AMZN","META","GOOGL","GOOG","NVDA","TSLA","JPM","V","MA","HD","PG","XOM","CVX"
];

const NASDAQ100 = [
"AAPL","MSFT","AMZN","META","GOOGL","NVDA","TSLA","PEP","AVGO","COST","ADBE","CSCO","AMD","QCOM","TXN"
];

function getUniverse() {
  const sel = document.getElementById("universeSelect").value;
  return sel === "nasdaq100" ? NASDAQ100 : SP500;
}

// ===== חישובי HV =====
function calcLogReturns(p){ let r=[]; for(let i=1;i<p.length;i++) r.push(Math.log(p[i]/p[i-1])); return r; }
function calcStd(a){ let m=a.reduce((x,y)=>x+y)/a.length; return Math.sqrt(a.reduce((x,y)=>x+(y-m)**2,0)/(a.length-1)); }
function calcHV(p){ return calcStd(calcLogReturns(p)) * Math.sqrt(252); }
function days(a,b){ return Math.round((b-a)/(1000*60*60*24)); }

// ===== API =====
async function fetchHistory(sym){
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=1y&interval=1d`;
    const r = await fetch(url);
    const d = await r.json();
    return d.chart.result[0].indicators.quote[0].close;
  } catch { return null; }
}

async function fetchOptions(sym){
  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/options/${sym}`;
    const r = await fetch(url);
    return await r.json();
  } catch { return null; }
}

async function fetchQuote(sym){
  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${sym}`;
    const r = await fetch(url);
    return r.json().then(x => x.quoteResponse.result[0].regularMarketPrice);
  } catch { return null; }
}

// ===== MAIN =====
async function build(){
  const tbody = document.getElementById("optionsBody");
  tbody.innerHTML = "<tr><td colspan='12'>טוען...</td></tr>";

  const minHv = +document.getElementById("minHv").value;
  const minM = +document.getElementById("minMonths").value;
  const maxM = +document.getElementById("maxMonths").value;

  const universe = getUniverse();
  const today = new Date();
  const out = [];

  for(const t of universe){
    const prices = await fetchHistory(t);
    const spot = await fetchQuote(t);

    if(!prices || !spot) continue;

    const hv = calcHV(prices);
    if(!hv || hv < minHv) continue;

    const chain = await fetchOptions(t);
    if(!chain || !chain.optionChain || !chain.optionChain.result) continue;

    const result = chain.optionChain.result[0];
    if(!result.options || !result.options.length) continue;

    for(const blk of result.options){
      const exp = new Date(blk.expirationDate * 1000);
      const d = days(today, exp);
      const m = d / 30;

      if(m < minM || m > maxM) continue;

      for(const opt of blk.calls || []){

        // סינון קשיח — אם חסר נתון → דלג
        if(!opt.strike) continue;
        if(!opt.lastPrice) continue;
        if(!opt.impliedVolatility) continue;

        const iv = opt.impliedVolatility;
        const score = hv - iv;
        const atm = Math.abs(opt.strike - spot);

        // חישוב break-even %
        const breakeven = (opt.strike + opt.lastPrice) / spot - 1;

        out.push({
          t, spot,
          strike: opt.strike,
          price: opt.lastPrice,
          exp: exp.toISOString().split("T")[0],
          days: d,
          hv, iv, score, atm,
          breakeven
        });
      }
    }
  }

  out.sort((a,b)=> b.score - a.score);

  tbody.innerHTML = "";
  for(const r of out){
    tbody.innerHTML += `
      <tr>
        <td>${r.t}</td>
        <td><span class="badge-call">CALL</span></td>
        <td>${r.spot.toFixed(2)}</td>
        <td>${r.strike.toFixed(2)}</td>
        <td>${r.atm.toFixed(2)}</td>
        <td>${r.price.toFixed(2)}</td>
        <td>${r.exp}</td>
        <td>${r.days}</td>
        <td>${r.hv.toFixed(3)}</td>
        <td>${r.iv.toFixed(3)}</td>
        <td class="${r.breakeven < 0.15 ? 'be-good' : 'be-bad'}">${(r.breakeven*100).toFixed(2)}%</td>
        <td class="${r.score>=0?'score-positive':'score-negative'}">${r.score.toFixed(3)}</td>
      </tr>`;
  }
}

document.getElementById("refreshBtn").onclick = build;
build();
</script>

</body>
</html>
