<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>דשבורד אופציות – HV/IV</title>
<style>
body { font-family: Arial; background:#050816; color:#f5f5f5; padding:20px; }
h1,h2 { text-align:center; }
.controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
input,select,button { padding:6px 10px; border-radius:4px; border:1px solid #444; background:#151a2c; color:#fff; }
button { cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th,td { border-bottom:1px solid #333; padding:8px; text-align:center; }
.badge-call { background:#1e88e5; padding:2px 6px; border-radius:4px; }
.score-positive { color:#4caf50; font-weight:bold; }
.score-negative { color:#f44336; font-weight:bold; }
</style>
</head>

<body>
<h1>דשבורד אופציות CALL – HV/IV</h1>
<h2>נתונים מ‑Finnhub</h2>

<div class="controls">
  <div>
    <label>מדד:</label>
    <select id="universeSelect">
      <option value="sp500">S&P 500</option>
      <option value="nasdaq100">Nasdaq 100</option>
    </select>
  </div>

  <div>
    <label>מספר אופציות להצגה:</label>
    <input type="number" id="limit" value="30" min="5" max="500" />
  </div>

  <div>
    <label>מינימום HV:</label>
    <input type="number" id="minHv" value="0.25" step="0.05" />
  </div>

  <div>
    <label>טווח פקיעה (חודשים):</label>
    <input type="number" id="minMonths" value="4" step="1" style="width:60px;" /> -
    <input type="number" id="maxMonths" value="8" step="1" style="width:60px;" />
  </div>

  <button id="refreshBtn">רענן</button>
</div>

<table>
<thead>
<tr>
<th>טיקר</th>
<th>CALL</th>
<th>מחיר מניה</th>
<th>סטרייק</th>
<th>ATM Δ</th>
<th>מחיר אופציה</th>
<th>פקיעה</th>
<th>ימים</th>
<th>HV</th>
<th>IV</th>
<th>Score</th>
</tr>
</thead>
<tbody id="optionsBody"></tbody>
</table>

<script>
// ===== API KEY =====
const FINNHUB_API_KEY = "d8et591r01qub7keo0dgd8et591r01qub7keo0e0";
const BASE = "https://finnhub.io/api/v1";

// ===== רשימות מדדים =====
// (רשימות מקוצרות — אפשר להרחיב בקלות)
const SP500 = [
"AAPL","MSFT","AMZN","META","GOOGL","GOOG","BRK.B","NVDA","TSLA","UNH","XOM","JPM","JNJ","V","PG","MA","HD","CVX","ABBV","PFE"
];

const NASDAQ100 = [
"AAPL","MSFT","AMZN","META","GOOGL","NVDA","TSLA","PEP","AVGO","COST","ADBE","CSCO","AMD","QCOM","TXN","AMGN","INTC","HON"
];

function getUniverse() {
  const sel = document.getElementById("universeSelect").value;
  return sel === "nasdaq100" ? NASDAQ100 : SP500;
}

// ===== חישובי HV =====
function calcLogReturns(p){ let r=[]; for(let i=1;i<p.length;i++) r.push(Math.log(p[i]/p[i-1])); return r; }
function calcStd(a){ let m=a.reduce((x,y)=>x+y)/a.length; return Math.sqrt(a.reduce((x,y)=>x+(y-m)**2,0)/(a.length-1)); }
function calcHV(p){ return calcStd(calcLogReturns(p)) * Math.sqrt(252); }
function days(a,b){ return Math.round((b-a)/(1000*60*60*24)); }

// ===== API =====
async function fetchCandles(sym){
  const now = Math.floor(Date.now()/1000);
  const from = now - 252*24*60*60;
  const url = `${BASE}/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${now}&token=${FINNHUB_API_KEY}`;
  const r = await fetch(url);
  const d = await r.json();
  if(d.s !== "ok") throw 0;
  return d.c;
}

async function fetchQuote(sym){
  const r = await fetch(`${BASE}/quote?symbol=${sym}&token=${FINNHUB_API_KEY}`);
  return (await r.json()).c;
}

async function fetchChain(sym){
  const r = await fetch(`${BASE}/stock/option-chain?symbol=${sym}&token=${FINNHUB_API_KEY}`);
  return await r.json();
}

// ===== MAIN =====
async function build(){
  const tbody = document.getElementById("optionsBody");
  tbody.innerHTML = "<tr><td colspan='11'>טוען...</td></tr>";

  const limit = +document.getElementById("limit").value;
  const minHv = +document.getElementById("minHv").value;
  const minM = +document.getElementById("minMonths").value;
  const maxM = +document.getElementById("maxMonths").value;

  const universe = getUniverse();
  const today = new Date();
  const out = [];

  for(const t of universe){
    let prices, spot;
    try { [prices, spot] = await Promise.all([fetchCandles(t), fetchQuote(t)]); }
    catch { continue; }

    const hv = calcHV(prices);
    if(!hv || hv < minHv) continue;

    let chain;
    try { chain = await fetchChain(t); }
    catch { continue; }

    if(!chain.data) continue;

    for(const blk of chain.data){
      const exp = new Date(blk.expirationDate);
      const d = days(today, exp);
      const m = d / 30;
      if(m < minM || m > maxM) continue;

      for(const opt of blk.options || []){
        if(opt.type !== "CALL") continue;
        if(!opt.strike || !opt.lastPrice || !opt.impliedVolatility) continue;

        const iv = opt.impliedVolatility;
        const score = hv - iv;
        const atm = Math.abs(opt.strike - spot);

        out.push({
          t, spot,
          strike: opt.strike,
          price: opt.lastPrice,
          exp: blk.expirationDate,
          days: d,
          hv, iv, score, atm
        });
      }
    }
  }

  out.sort((a,b)=> b.score - a.score || a.atm - b.atm);
  const top = out.slice(0, limit);

  tbody.innerHTML = "";
  for(const r of top){
    tbody.innerHTML += `
      <tr>
        <td>${r.t}</td>
        <td><span class="badge-call">CALL</span></td>
        <td>${r.spot.toFixed(2)}</td>
        <td>${r.strike.toFixed(2)}</td>
        <td>${r.atm.toFixed(2)}</td>
        <td>${r.price.toFixed(2)}</td>
        <td>${r.exp}</td>
        <td>${r.days}</td>
        <td>${r.hv.toFixed(3)}</td>
        <td>${r.iv.toFixed(3)}</td>
        <td class="${r.score>=0?'score-positive':'score-negative'}">${r.score.toFixed(3)}</td>
      </tr>`;
  }
}

document.getElementById("refreshBtn").onclick = build;
build();
</script>

</body>
</html>
